version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "biome*"
          - "@biomejs/*"
          - "playwright*"
          - "@playwright/*"
      nestjs:
        patterns:
          - "@nestjs/*"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
