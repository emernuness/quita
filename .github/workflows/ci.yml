name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quita
          POSTGRES_PASSWORD: quita
          POSTGRES_DB: quita
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://quita:quita@localhost:5432/quita?schema=public
      JWT_SECRET: ci-jwt-secret-min-32-chars-only-for-tests
      REFRESH_TOKEN_HMAC_SECRET: ci-refresh-hmac-secret-distinct-tests

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Apply Prisma migrations
        run: pnpm --filter @quita/api exec prisma migrate deploy
      - name: Seed reference tables
        run: pnpm --filter @quita/api db:seed
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
